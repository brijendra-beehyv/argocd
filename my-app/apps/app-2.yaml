apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-2
  finalizers:
  - resources-finalizer.argocd.argoproj.io
  namespace: argocd
spec:
  destination:
    server: https://kubernetes.default.svc
  project: default
  source:
    path: my-app/app-2
    repoURL: https://github.com/brijendra-beehyv/argocd.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - Validate=true
